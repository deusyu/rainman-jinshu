name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: themes.json 漂移校验（maps + covers 可重建）
        run: bun src/bundle.mjs --check
      - name: 渲染断言冒烟
        run: bun test/smoke.mjs
